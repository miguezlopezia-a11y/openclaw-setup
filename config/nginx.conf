worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting - protege contra abuso
    limit_req_zone $binary_remote_addr zone=openclaw:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Ocultar version de nginx
    server_tokens off;

    # Keepalive
    keepalive_timeout 75;
    keepalive_requests 1000;

    # Buffers
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;

    server {
        listen 443 ssl;
        server_name 204.168.163.167;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # MVP Albergues - Next.js puerto 3000
        location /albergues {
            proxy_pass         http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30;
        }

        # WebSocket proxy (sin rate limit para no interrumpir sesiones)
        location /ws {
            proxy_pass         http://host.docker.internal:18789;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        location / {
            limit_req zone=openclaw burst=20 nodelay;
            limit_conn addr 20;

            proxy_pass         http://host.docker.internal:18789;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    server {
        listen 80;
        server_tokens off;
        return 301 https://$host$request_uri;
    }
}
